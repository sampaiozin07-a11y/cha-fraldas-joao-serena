<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirmar Mimo 🎁</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<section class="mimos">


<h1>🎁 Confirmar escolha do mimo</h1>


<h2 id="mimoEscolhido"></h2>


<input type="text" id="nome" placeholder="Digite seu nome">


<input type="tel" id="telefone" placeholder="Digite seu WhatsApp">


<button onclick="confirmarMimo()">
Confirmar participação
</button>


<div id="resultado"></div>


</section>



<script>


let link = new URLSearchParams(window.location.search);


let mimo = link.get("mimo");


document.getElementById("mimoEscolhido").innerHTML =
"Você escolheu: 🎁 " + mimo;



function confirmarMimo(){

let nome = document.getElementById("nome").value;

let telefone = document.getElementById("telefone").value;

let numero = Math.floor(Math.random() * 100) + 1;


fetch("https://script.google.com/macros/s/AKfycbyyDAwtG5np2aP2EwQjvrkOf4GJzESFx9_95q_L-4SV9MrM9cplsg7Ow2IPDtJPLOzhuA/exec", {

method: "POST",

mode: "no-cors",

body: JSON.stringify({

mimo: mimo,

nome: nome,

telefone: telefone,

numero: numero

})

});


document.getElementById("resultado").innerHTML =

"✅ Escolha confirmada!<br><br>" +

"🎁 Mimo: " + mimo +

"<br>👤 Nome: " + nome +

"<br>📱 WhatsApp: " + telefone +

"<br>🎟️ Número do sorteio: " + numero;

}

</script>


</body>

</html>
