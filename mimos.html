<script>


function escolherMimo(nome, botao){


window.open(
"formulario.html?mimo=" + encodeURIComponent(nome),
"_blank"
);


}



let linkPlanilha = "https://script.google.com/macros/s/AKfycby7DVHg77x9IXONGHvePklas-HCcWi1-1O6z9kxYGrYgmdt9xBVY_IYAd39fXuonPLGRQ/exec";



fetch(linkPlanilha)

.then(res => res.json())

.then(dados => {


let escolhidos = dados.slice(1).map(linha => linha[0]);



let botoes = document.querySelectorAll(".lista-mimos button");



botoes.forEach(botao => {


let texto = botao.innerText;



escolhidos.forEach(mimo => {


if(texto.includes(mimo)){


botao.style.display = "none";


}


});


});


});


</script>
